name: Sync Closing Snapshot

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target trading date in YYYY-MM-DD format'
        required: false
        type: string
  schedule:
    - cron: '30 11 * * 1-5'

permissions:
  contents: write

jobs:
  sync-close-snapshot:
    runs-on: ubuntu-latest
    env:
      TARGET_DATE: ${{ github.event.inputs.target_date }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate target date input
        if: ${{ env.TARGET_DATE != '' }}
        run: |
          echo "${TARGET_DATE}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'

      - name: Derive date environment
        run: |
          # Returns "holiday" if the given ISO date is an NSE holiday, else "trading".
          holiday_check() {
            node -e '
              const fs=require("fs");
              const M={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
              const set=new Set();
              try{const h=JSON.parse(fs.readFileSync("data/nse-holidays.json","utf8"));for(const g of Object.values(h.holidays||{}))for(const e of (g||[])){const m=/^(\d{2})-([A-Za-z]{3})-(\d{4})$/.exec((e&&e.tradingDate)||"");if(m)set.add(m[3]+"-"+M[m[2]]+"-"+m[1]);}}catch(e){}
              process.stdout.write(set.has(process.argv[1])?"holiday":"trading");
            ' "$1"
          }
          # Steps back to the last weekday that is not an NSE holiday.
          last_trading_day() {
            node -e '
              const fs=require("fs");
              const M={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
              const set=new Set();
              try{const h=JSON.parse(fs.readFileSync("data/nse-holidays.json","utf8"));for(const g of Object.values(h.holidays||{}))for(const e of (g||[])){const m=/^(\d{2})-([A-Za-z]{3})-(\d{4})$/.exec((e&&e.tradingDate)||"");if(m)set.add(m[3]+"-"+M[m[2]]+"-"+m[1]);}}catch(e){}
              let d=new Date(process.argv[1]+"T00:00:00Z");
              for(let i=0;i<60;i++){const iso=d.toISOString().slice(0,10);const dow=d.getUTCDay();if(dow!==0&&dow!==6&&!set.has(iso)){console.log(iso);process.exit(0);}d.setUTCDate(d.getUTCDate()-1);}
              console.log(process.argv[1]);
            ' "$1"
          }

          if [ -z "${TARGET_DATE}" ]; then
            _today="$(date -u +%Y-%m-%d)"
            _dow="$(date -u -d "$_today" +%u)"
            if [ "$_dow" -ge 6 ] || [ "$(holiday_check "$_today")" = "holiday" ]; then
              echo "Skipping sync: ${_today} is a weekend or NSE holiday; no closing data to sync."
              echo "SKIP_SYNC=true" >> "$GITHUB_ENV"
              exit 0
            fi
            TARGET_DATE="$_today"
          else
            # Manual override: resolve to the last actual trading day on/before the input.
            TARGET_DATE="$(last_trading_day "${TARGET_DATE}")"
          fi

          ARCHIVE_DATE="$(node -e "const [y,m,d]=process.argv[1].split('-'); console.log(\`\${d}\${m}\${y.slice(-2)}\`)" "${TARGET_DATE}")"
          echo "Resolved trading date: ${TARGET_DATE} (archive ${ARCHIVE_DATE})"
          echo "NSE_TARGET_DATE=${TARGET_DATE}" >> "$GITHUB_ENV"
          echo "NSE_ARCHIVE_DATE=${ARCHIVE_DATE}" >> "$GITHUB_ENV"
          echo "NSE_INDEX_CACHE_DATE=${TARGET_DATE}" >> "$GITHUB_ENV"
          echo "NSE_INDEX_HISTORY_DATE=${TARGET_DATE}" >> "$GITHUB_ENV"

      - name: Fetch latest closing snapshot
        if: ${{ env.SKIP_SYNC != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          LIVE_SNAPSHOT_BUCKET: ${{ secrets.LIVE_SNAPSHOT_BUCKET }}
          LIVE_SNAPSHOT_PATH: ${{ secrets.LIVE_SNAPSHOT_PATH }}
        run: |
          SNAPSHOT_BUCKET="${LIVE_SNAPSHOT_BUCKET:-public-data}"
          SNAPSHOT_PATH="${LIVE_SNAPSHOT_PATH:-live/live-snapshot.json}"
          SNAPSHOT_URL="${SUPABASE_URL%/}/storage/v1/object/public/${SNAPSHOT_BUCKET}/${SNAPSHOT_PATH}"
          curl --fail --silent --show-error "${SNAPSHOT_URL}?t=$(date +%s)" -o data/live-snapshot.json
          node -e "JSON.parse(require('fs').readFileSync('data/live-snapshot.json', 'utf8')); console.log('Snapshot JSON verified.');"

      - name: Sync daily market activity archive
        if: ${{ env.SKIP_SYNC != 'true' }}
        run: node scripts/update-market-activity-history.mjs

      - name: Cache daily index summary
        if: ${{ env.SKIP_SYNC != 'true' }}
        run: node scripts/cache-daily-index-summary.mjs

      - name: Update index summary history
        if: ${{ env.SKIP_SYNC != 'true' }}
        run: node scripts/update-index-summary-history.mjs

      - name: Commit snapshot update
        if: ${{ env.SKIP_SYNC != 'true' }}
        run: |
          if git diff --quiet -- data/live-snapshot.json data/market-activity-history.csv data/index-summary-history.csv data/index-cache; then
            echo "No nightly market data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-snapshot.json data/market-activity-history.csv data/index-summary-history.csv data/index-cache
          if [ -n "${TARGET_DATE}" ]; then
            git commit -m "Sync nightly market data for ${TARGET_DATE}"
          else
            git commit -m "Sync nightly market data"
          fi
          git push
