name: Refresh Live Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/3 * * * *'

jobs:
  refresh-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Decide refresh mode
        id: decide
        shell: bash
        run: |
          ist_hour=$(TZ=Asia/Kolkata date +%H)
          ist_minute=$(TZ=Asia/Kolkata date +%M)
          ist_weekday=$(TZ=Asia/Kolkata date +%u)
          current_minutes=$((10#$ist_hour * 60 + 10#$ist_minute))

          if [[ "$ist_weekday" -ge 1 && "$ist_weekday" -le 5 && "$current_minutes" -ge 540 && "$current_minutes" -le 960 ]]; then
            echo "mode=live" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$current_minutes" -ge 360 && "$current_minutes" -lt 1440 && "$((10#$ist_minute))" -eq 0 ]]; then
            echo "mode=afterhours" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=skip" >> "$GITHUB_OUTPUT"

      - name: Refresh live snapshot
        if: steps.decide.outputs.mode == 'live'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          LIVE_SNAPSHOT_REFRESH_SECRET: ${{ secrets.LIVE_SNAPSHOT_REFRESH_SECRET }}
        run: |
          endpoint="${SUPABASE_URL%/}/functions/v1/refresh-live-snapshot"
          if [[ -n "$LIVE_SNAPSHOT_REFRESH_SECRET" ]]; then
            curl --fail --silent --show-error -X POST "$endpoint" \
              -H "Content-Type: application/json" \
              -H "x-refresh-secret: $LIVE_SNAPSHOT_REFRESH_SECRET" \
              -d '{}'
          else
            curl --fail --silent --show-error -X POST "$endpoint" \
              -H "Content-Type: application/json" \
              -d '{}'
          fi

      - name: Refresh after-hours rails
        if: steps.decide.outputs.mode == 'afterhours'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          curl --fail --silent --show-error -X POST "${SUPABASE_URL%/}/functions/v1/refresh-news-feed" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Skip outside schedule window
        if: steps.decide.outputs.mode == 'skip'
        run: echo "No refresh needed for this run."