name: Deploy Nifty Analytica Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pages.yml'
      - 'assets/**'
      - 'data/**'
      - 'index.html'
      - 'privacy/**'
      - 'unsubscribe/**'
      - 'robots.txt'
      - 'site.webmanifest'
      - 'sitemap.xml'
      - 'CNAME'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write runtime config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          LIVE_SNAPSHOT_BUCKET: ${{ secrets.LIVE_SNAPSHOT_BUCKET }}
          LIVE_SNAPSHOT_PATH: ${{ secrets.LIVE_SNAPSHOT_PATH }}
        run: |
          cat <<EOF > assets/runtime-config.js
          window.RUNTIME_CONFIG = window.RUNTIME_CONFIG || {
            SUPABASE_URL: '${SUPABASE_URL}',
            SUPABASE_PUBLISHABLE_KEY: '${SUPABASE_PUBLISHABLE_KEY}',
            LIVE_SNAPSHOT_BUCKET: '${LIVE_SNAPSHOT_BUCKET:-public-data}',
            LIVE_SNAPSHOT_PATH: '${LIVE_SNAPSHOT_PATH:-live/live-snapshot.json}',
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4