name: Refresh News Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1-17 * * *'

permissions:
  contents: write

jobs:
  refresh-news-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update news feed
        run: node scripts/update-news-feed.mjs

      - name: Commit news feed
        run: |
          if git diff --quiet -- data/news-feed.json; then
            echo "No news updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news-feed.json
          git commit -m "Refresh news feed"
          git push