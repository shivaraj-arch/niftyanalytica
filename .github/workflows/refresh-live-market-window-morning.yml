name: Refresh Live Market Window 09-12

on:
  workflow_dispatch:

concurrency:
  group: refresh-live-market-window-morning
  cancel-in-progress: false

jobs:
  refresh-live-window:
    runs-on: ubuntu-latest
    timeout-minutes: 185
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_CLASSIC_PAT != '' && secrets.GITHUB_CLASSIC_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh GitHub live snapshot every minute
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          started_at=$(date +%s)
          duration_seconds=$((180 * 60))

          commit_and_push() {
            if git diff --quiet -- data/live-snapshot.json; then
              return
            fi

            git add data/live-snapshot.json
            git commit -m "Refresh live market data"
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          }

          while true; do
            elapsed=$(( $(date +%s) - started_at ))
            if (( elapsed >= duration_seconds )); then
              break
            fi

            REFRESH_NEWS_BUNDLE=false node scripts/update-live-snapshot.mjs

            commit_and_push

            elapsed=$(( $(date +%s) - started_at ))
            remaining=$(( duration_seconds - elapsed ))
            if (( remaining <= 0 )); then
              break
            fi

            sleep "$(( remaining < 60 ? remaining : 60 ))"
          done