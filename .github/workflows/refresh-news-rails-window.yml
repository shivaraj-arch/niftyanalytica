name: Refresh News Rails Window

on:
  workflow_dispatch:

concurrency:
  group: refresh-news-rails-window
  cancel-in-progress: false

jobs:
  refresh-news-window:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_CLASSIC_PAT != '' && secrets.GITHUB_CLASSIC_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh GitHub news rails once
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node scripts/update-news-feed.mjs

          if ! git diff --quiet -- data/news-feed.json; then
            git add data/news-feed.json
            git commit -m "Refresh news rails"
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          fi